<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADEO-Net | Medical Foundation Model Datasets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'aggie-maroon': '#500000',
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset("react-classic", {
            presets: [
                [Babel.availablePresets["react"], { runtime: "classic" }]
            ]
        });
    </script>
    <!-- If live google sheet is to be used -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script> -->
    <!-- Downloaded sheets used here -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* Custom Texas A&M Brand Colors */
        .bg-aggie-maroon {
            background-color: #500000;
        }

        .text-aggie-maroon {
            color: #500000;
        }

        .border-aggie-maroon {
            border-color: #500000;
        }

        .ring-aggie-maroon {
            --tw-ring-color: #500000;
        }
    </style>
</head>

<body class="bg-gray-50 antialiased text-gray-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react-classic">

        console.log("✅ Babel successfully compiled the script!");
        const { useState, useEffect, useMemo, useRef } = React;

        const MultiSelect = ({ label, options, selected, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleOption = (option) => {
                if (selected.includes(option)) {
                    onChange(selected.filter(item => item !== option));
                } else {
                    onChange([...selected, option]);
                }
            };

            const toggleAll = () => {
                if (selected.length === options.length) {
                    onChange([]);
                } else {
                    onChange([...options]);
                }
            };

            const filteredOptions = useMemo(() => {
                return options.filter(opt => {
                    const strOpt = opt !== undefined && opt !== null ? String(opt) : '';
                    return strOpt.toLowerCase().includes(searchQuery.toLowerCase());
                });
            }, [options, searchQuery]);

            const displayText = useMemo(() => {
                if (selected.length === 0) return 'All';
                if (selected.length === options.length) return 'All';
                if (selected.length <= 2) return selected.map(val => String(val)).join(', ');
                return `${selected.length} selected`;
            }, [selected, options]);

            return (
                <div className="relative w-full text-left" ref={dropdownRef}>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">{label}</label>
                    <button
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className="flex items-center justify-between w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-aggie-maroon transition-all cursor-pointer"
                    >
                        <span className="truncate font-medium text-gray-800">{displayText}</span>
                        <svg
                            className={`ml-2 h-4 w-4 text-gray-500 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    {isOpen && (
                        <div className="absolute z-30 mt-2 w-full min-w-[220px] rounded-md bg-white shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none overflow-hidden transition-all duration-150">
                            <div className="p-2 border-b border-gray-100 bg-gray-50 space-y-2">
                                <input
                                    type="text"
                                    placeholder={`Search ${label.toLowerCase()}...`}
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') e.preventDefault();
                                    }}
                                    className="w-full rounded border border-gray-300 px-2.5 py-1.5 text-xs focus:ring-1 focus:ring-aggie-maroon focus:border-aggie-maroon outline-none"
                                />
                                <div className="flex justify-between items-center px-1 text-[11px]">
                                    <button
                                        type="button"
                                        onClick={toggleAll}
                                        className="text-aggie-maroon hover:underline font-semibold"
                                    >
                                        {selected.length === options.length ? 'Clear All' : 'Select All'}
                                    </button>
                                    <span className="text-gray-400">
                                        {selected.length} of {options.length} selected
                                    </span>
                                </div>
                            </div>

                            <div className="max-h-60 overflow-y-auto py-1 text-sm text-gray-700">
                                {filteredOptions.length > 0 ? (
                                    filteredOptions.map((option) => {
                                        const isChecked = selected.includes(option);
                                        return (
                                            <label
                                                key={option}
                                                className="flex items-center px-3 py-1.5 hover:bg-gray-50 cursor-pointer select-none transition-colors"
                                            >
                                                <input
                                                    type="checkbox"
                                                    checked={isChecked}
                                                    onChange={() => toggleOption(option)}
                                                    className="h-4 w-4 rounded border-gray-300 text-aggie-maroon focus:ring-aggie-maroon focus:ring-offset-0 transition-colors"
                                                />
                                                <span className="ml-2.5 truncate font-medium text-gray-800">{option}</span>
                                            </label>
                                        );
                                    })
                                ) : (
                                    <div className="px-3 py-4 text-center text-xs text-gray-400">
                                        No options found
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const modalityImages = {
            'ctpet': 'CT & PET.jpg',
            'dermoscopy': 'Dermoscopy.jpg',
            'endoscopy': 'Endoscopy.jpg',
            'fundus': 'Fundus.jpg',
            'mri': 'MRI.jpg',
            'microscopy': 'Microscopy.jpg',
            'octa': 'OCTA.jpg',
            'oct': 'OCT.jpeg',
            'ultrasound': 'Ultrasound.jpg',
            'xray': 'X-Ray.jpg'
        };

        const App = () => {
            const [error, setError] = useState(null);
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState({ bodyPart: [], anatomicalArea: [], modality: [] });
            const [searchQuery, setSearchQuery] = useState('');
            const [hoveredModality, setHoveredModality] = useState(null);
            const [tooltipPos, setTooltipPos] = useState({ top: 0, left: 0 });

            const handleMouseMove = (e, modality) => {
                const tooltipWidth = 210;
                const tooltipHeight = 180;
                let left = e.clientX + 12;
                let top = e.clientY + 12;
                if (left + tooltipWidth > window.innerWidth) {
                    left = e.clientX - tooltipWidth - 12;
                }
                if (top + tooltipHeight > window.innerHeight) {
                    top = e.clientY - tooltipHeight - 12;
                }
                setTooltipPos({ top, left });
            };

            // live sheet
            // useEffect(() => {
            //     // Using the gviz endpoint to retrieve a clean CSV export of Sheet1
            //     const sheetUrl = 'https://docs.google.com/spreadsheets/d/1UBtmuaUf7_Fv957LMBmn6lMadUM-z7scKS8El4i3Thk/gviz/tq?tqx=out:csv&sheet=Sheet1';

            //     Papa.parse(sheetUrl, {
            //         download: true,
            //         header: true,
            //         skipEmptyLines: true,
            //         complete: (results) => {
            //             // Filter out empty rows or meta-rows (like #REF!)
            //             const parsedData = results.data
            //                 .filter(row => row['Name'] && row['Name'].trim() !== '')
            //                 .map(row => ({
            //                     name: row['Name'] || '',
            //                     website: row['Website'] || '',
            //                     bodyPart: row['Body Part'] || 'Unknown',
            //                     anatomicalArea: row['Anatomical Area'] || 'Unknown',
            //                     modality: row['Modality'] || 'Unknown'
            //                 }));
            //             setData(parsedData);
            //             setLoading(false);
            //         },
            //         error: (err) => {
            //             console.error('Error fetching CSV:', err);
            //             setLoading(false);
            //         }
            //     });
            // }, []);
            // Downloaded sheet
            useEffect(() => {
                // Make sure this matches the exact filename of the Excel file in your GitHub repo
                const fileUrl = encodeURI('./Medical Imaging Datasets.xlsx');

                const parseNum = (val) => {
                    if (val === undefined || val === null) return 0;
                    if (typeof val === 'number') return val;
                    const clean = String(val).replace(/,/g, '').trim();
                    const num = parseFloat(clean);
                    return isNaN(num) ? 0 : num;
                };

                fetch(fileUrl)
                    .then(response => {
                        if (!response.ok) throw new Error("Could not fetch the Excel file");
                        return response.arrayBuffer();
                    })
                    .then(buffer => {
                        // Parse the Excel file buffer
                        const workbook = XLSX.read(buffer, { type: 'array' });

                        // Look specifically for 'Sheet1', or fallback to the first sheet
                        const sheetName = workbook.SheetNames.includes('Sheet1')
                            ? 'Sheet1'
                            : workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];

                        // Convert that specific sheet to an array of JavaScript objects
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);

                        // Filter and map the data exactly as we did before
                        const parsedData = jsonData
                            .filter(row => {
                                const hasName = row['Name'] !== undefined && row['Name'] !== null && String(row['Name']).trim() !== '';
                                const isDownloaded = row['Downloaded'] === true ||
                                    (row['Downloaded'] !== undefined && row['Downloaded'] !== null && String(row['Downloaded']).trim().toLowerCase() === 'true');
                                return hasName && isDownloaded;
                            })
                            .map(row => {
                                const nameVal = row['Name'] !== undefined && row['Name'] !== null ? String(row['Name']).trim() : '';
                                const websiteVal = row['Website'] !== undefined && row['Website'] !== null ? String(row['Website']).trim() : '';
                                const bodyPartVal = row['Body Part'] !== undefined && row['Body Part'] !== null ? String(row['Body Part']).trim() : 'Unknown';
                                const anatomicalAreaVal = row['Anatomical Area'] !== undefined && row['Anatomical Area'] !== null ? String(row['Anatomical Area']).trim() : 'Unknown';
                                const modalityVal = row['Broad Modality'] !== undefined && row['Broad Modality'] !== null ? String(row['Broad Modality']).trim() : 'Unknown';
                                const hostingPlatformVal = row['Hosting Platform'] !== undefined && row['Hosting Platform'] !== null ? String(row['Hosting Platform']).trim() : 'Unknown';
                                const yearVal = row['Year'] !== undefined && row['Year'] !== null ? String(row['Year']).trim() : 'Unknown';
                                const datasetSizeVal = row['Dataset Size'] !== undefined && row['Dataset Size'] !== null ? String(row['Dataset Size']).trim() : 'Unknown';

                                return {
                                    name: nameVal,
                                    website: websiteVal,
                                    bodyPart: bodyPartVal === '' ? 'Unknown' : bodyPartVal,
                                    anatomicalArea: anatomicalAreaVal === '' ? 'Unknown' : anatomicalAreaVal,
                                    modality: modalityVal === '' ? 'Unknown' : modalityVal,
                                    hostingPlatform: hostingPlatformVal === '' ? 'Unknown' : hostingPlatformVal,
                                    year: yearVal === '' ? 'Unknown' : yearVal,
                                    datasetSize: datasetSizeVal === '' ? 'Unknown' : datasetSizeVal,
                                    numImages: parseNum(row['# Images']),
                                    numSamples: parseNum(row['# Samples']),
                                    sizeGb: parseNum(row['Size (GB)'])
                                };
                            });

                        setData(parsedData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Error fetching or parsing XLSX:', err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Dynamically generate unique filter options based on the live sheet
            const uniqueBodyParts = useMemo(() => [...new Set(data.map(item => item.bodyPart ? String(item.bodyPart).trim() : 'Unknown').filter(Boolean).sort())], [data]);
            const uniqueAnatomicalAreas = useMemo(() => [...new Set(data.map(item => item.anatomicalArea ? String(item.anatomicalArea).trim() : 'Unknown').filter(Boolean).sort())], [data]);
            const uniqueModalities = useMemo(() => {
                const allMods = new Set();
                data.forEach(item => {
                    if (item.modality) {
                        String(item.modality).split(',').forEach(m => allMods.add(m.trim()));
                    }
                });
                return [...Array.from(allMods).sort()];
            }, [data]);

            // Apply selected filters
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const itemBody = item.bodyPart ? String(item.bodyPart) : 'Unknown';
                    const itemArea = item.anatomicalArea ? String(item.anatomicalArea) : 'Unknown';
                    const itemModality = item.modality ? String(item.modality) : 'Unknown';
                    const itemName = item.name ? String(item.name) : '';

                    const matchBody = filters.bodyPart.length === 0 || filters.bodyPart.includes(itemBody);
                    const matchArea = filters.anatomicalArea.length === 0 || filters.anatomicalArea.includes(itemArea);
                    const matchModality = filters.modality.length === 0 ||
                        itemModality.split(',').map(m => m.trim()).some(m => filters.modality.includes(m));
                    const matchSearch = searchQuery.trim() === '' ||
                        itemName.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchBody && matchArea && matchModality && matchSearch;
                });
            }, [data, filters, searchQuery]);





            const handleExportCSV = () => {
                const headers = ['Dataset Name', 'Modality', 'Body Part', 'Anatomical Area', 'Dataset Size', 'Website URL'];
                const rows = filteredData.map(item => [
                    item.name,
                    item.modality,
                    item.bodyPart,
                    item.anatomicalArea,
                    item.datasetSize,
                    item.website || ''
                ]);

                const csvContent = [
                    headers.join(','),
                    ...rows.map(row => row.map(val => {
                        const escaped = String(val).replace(/"/g, '""');
                        return `"${escaped}"`;
                    }).join(','))
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', 'radeonet_filtered_datasets.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Header */}
                    <header className="bg-gradient-to-br from-slate-950 via-slate-900 to-rose-950 text-white relative overflow-hidden py-16 border-b border-rose-900/40">
                        {/* Background grid design */}
                        <div className="absolute inset-0 opacity-15 pointer-events-none">
                            <svg className="w-full h-full" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="1" />
                                    </pattern>
                                </defs>
                                <rect width="100%" height="100%" fill="url(#grid)" />
                            </svg>
                        </div>
                        {/* Glowing orb accent */}
                        <div className="absolute -top-40 -right-40 w-96 h-96 bg-rose-700/20 rounded-full blur-3xl pointer-events-none"></div>
                        <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-700/10 rounded-full blur-3xl pointer-events-none"></div>

                        <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-4">
                            <h1 className="text-4xl md:text-5xl font-black tracking-tight text-white">
                                <span className="bg-gradient-to-r from-rose-200 via-rose-100 to-indigo-200 bg-clip-text text-transparent">RADEO-Net</span>
                            </h1>
                            <p className="text-slate-300 text-base md:text-lg max-w-2xl mx-auto font-medium">
                                The internet-scale medical imaging repository used for training the RADEO radiology foundation model.
                            </p>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        {error ? (
                            <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md mb-6">
                                <h3 className="text-sm font-medium text-red-800">Error loading data: {error}</h3>
                            </div>
                        ) : loading ? (
                            <div className="flex justify-center items-center h-64">
                                <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-aggie-maroon"></div>
                            </div>
                        ) : (
                            <div className="space-y-6">


                                {/* Search & Filters Section */}
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-6">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-50 pb-4">
                                        <div>
                                            <h3 className="text-base font-bold text-slate-900">Search & Filter Catalog</h3>
                                            <p className="text-xs text-slate-400">Narrow down the list by searching names or selecting options.</p>
                                        </div>
                                        {(filters.bodyPart.length > 0 || filters.anatomicalArea.length > 0 || filters.modality.length > 0 || searchQuery !== '') && (
                                            <button
                                                type="button"
                                                onClick={() => {
                                                    setFilters({ bodyPart: [], anatomicalArea: [], modality: [] });
                                                    setSearchQuery('');
                                                }}
                                                className="text-xs font-semibold text-aggie-maroon hover:text-red-900 flex items-center gap-1 transition-colors outline-none cursor-pointer self-start sm:self-center"
                                            >
                                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                </svg>
                                                Reset Active Filters
                                            </button>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        {/* Name Search Box */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Search Dataset</label>
                                            <div className="relative">
                                                <input
                                                    type="text"
                                                    value={searchQuery}
                                                    onChange={(e) => {
                                                        setSearchQuery(e.target.value);
                                                    }}
                                                    onKeyDown={(e) => {
                                                        if (e.key === 'Enter') e.preventDefault();
                                                    }}
                                                    placeholder="Search by name..."
                                                    className="w-full rounded-md border border-gray-300 pl-9 pr-3 py-2 text-sm text-gray-900 placeholder-slate-400 focus:ring-2 focus:ring-aggie-maroon focus:border-aggie-maroon outline-none transition-all shadow-sm"
                                                />
                                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                    <svg className="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                                    </svg>
                                                </div>
                                            </div>
                                        </div>

                                        <MultiSelect
                                            label="Body Part"
                                            options={uniqueBodyParts}
                                            selected={filters.bodyPart}
                                            onChange={(val) => {
                                                setFilters(prev => ({ ...prev, bodyPart: val }));
                                            }}
                                        />
                                        <MultiSelect
                                            label="Anatomical Area"
                                            options={uniqueAnatomicalAreas}
                                            selected={filters.anatomicalArea}
                                            onChange={(val) => {
                                                setFilters(prev => ({ ...prev, anatomicalArea: val }));
                                            }}
                                        />
                                        <MultiSelect
                                            label="Modality"
                                            options={uniqueModalities}
                                            selected={filters.modality}
                                            onChange={(val) => {
                                                setFilters(prev => ({ ...prev, modality: val }));
                                            }}
                                        />
                                    </div>
                                </div>

                                {/* Table Structure */}
                                <div className="bg-white shadow-md border border-gray-100 sm:rounded-2xl overflow-hidden">
                                    {/* Table Header Summary & Export */}
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between px-6 py-5 border-b border-gray-100 bg-white gap-4">
                                        <div>
                                            <h2 className="text-lg font-bold text-gray-900">Medical Datasets Catalog</h2>
                                            <p className="mt-1 text-sm text-gray-500">
                                                Showing <span className="font-semibold text-aggie-maroon">{filteredData.length}</span> datasets matching your criteria
                                            </p>
                                        </div>
                                        <div>
                                            <button
                                                type="button"
                                                onClick={handleExportCSV}
                                                disabled={filteredData.length === 0}
                                                className="inline-flex items-center gap-2 rounded-lg bg-aggie-maroon px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-red-900 focus:outline-none focus:ring-2 focus:ring-aggie-maroon transition-all disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                </svg>
                                                Export CSV
                                            </button>
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="min-w-full divide-y divide-gray-200">
                                            <thead className="bg-gray-50/75 border-b border-gray-200">
                                                <tr>
                                                    <th scope="col" className="py-4 px-6 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Dataset Name</th>
                                                    <th scope="col" className="py-4 px-6 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Modality</th>
                                                    <th scope="col" className="py-4 px-6 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Body Part</th>
                                                    <th scope="col" className="py-4 px-6 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Anatomical Area</th>
                                                    <th scope="col" className="py-4 px-6 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Dataset Size</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 bg-white">
                                                {filteredData.length > 0 ? filteredData.map((row, idx) => (
                                                    <tr key={`${row.name}-${idx}`} className="hover:bg-slate-50/70 transition-colors duration-150">
                                                        <td className="py-4 px-6 text-sm font-semibold text-gray-900 break-words max-w-xs">
                                                            {row.website ? (
                                                                <a
                                                                    href={row.website}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="text-aggie-maroon hover:text-red-900 hover:underline decoration-2 underline-offset-2 transition-all"
                                                                >
                                                                    {row.name}
                                                                </a>
                                                            ) : (
                                                                row.name
                                                            )}
                                                        </td>
                                                        <td className="py-4 px-6 text-sm text-gray-500">
                                                            <div className="flex flex-wrap gap-1.5">
                                                                {row.modality.split(',').map((mod, i) => {
                                                                    const m = mod.trim();
                                                                    let badgeClass = "bg-slate-50 text-slate-700 border-slate-200/80";
                                                                    if (/CT & PET/i.test(m)) badgeClass = "bg-cyan-50 text-cyan-700 border-cyan-200/60";
                                                                    else if (/MRI/i.test(m)) badgeClass = "bg-emerald-50 text-emerald-700 border-emerald-200/60";
                                                                    else if (/X-Ray/i.test(m)) badgeClass = "bg-violet-50 text-violet-700 border-violet-200/60";
                                                                    else if (/Ultrasound/i.test(m)) badgeClass = "bg-amber-50 text-amber-700 border-amber-200/60";
                                                                    else if (/Microscopy/i.test(m)) badgeClass = "bg-purple-50 text-purple-700 border-purple-200/60";
                                                                    else if (/Fundus/i.test(m)) badgeClass = "bg-teal-50 text-teal-700 border-teal-200/60";
                                                                    else if (/OCTA/i.test(m)) badgeClass = "bg-indigo-50 text-indigo-700 border-indigo-200/60";
                                                                    else if (/Endoscopy/i.test(m)) badgeClass = "bg-orange-50 text-orange-700 border-orange-200/60";
                                                                    else if (/Dermoscopy/i.test(m)) badgeClass = "bg-rose-50 text-rose-700 border-rose-200/60";

                                                                    return (
                                                                        <span
                                                                            key={i}
                                                                            className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border transition-all duration-150 cursor-help ${badgeClass}`}
                                                                            onMouseEnter={() => {
                                                                                const normalized = m.toLowerCase().replace(/amp/g, '').replace(/and/g, '').replace(/[^a-z0-9]/g, '');
                                                                                console.log("Hovered modality raw:", m, "Normalized key:", normalized, "Image file:", modalityImages[normalized]);
                                                                                setHoveredModality(m);
                                                                            }}
                                                                            onMouseMove={(e) => handleMouseMove(e, m)}
                                                                            onMouseLeave={() => setHoveredModality(null)}
                                                                        >
                                                                            {m}
                                                                        </span>
                                                                    );
                                                                })}
                                                            </div>
                                                        </td>
                                                        <td className="whitespace-nowrap py-4 px-6 text-sm">
                                                            <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-semibold bg-slate-100 text-slate-800 border border-slate-200/50">
                                                                {row.bodyPart}
                                                            </span>
                                                        </td>
                                                        <td className="whitespace-nowrap py-4 px-6 text-sm">
                                                            <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-semibold bg-indigo-50/70 text-indigo-700 border border-indigo-100/60">
                                                                {row.anatomicalArea}
                                                            </span>
                                                        </td>
                                                        <td className="whitespace-nowrap py-4 px-6 text-sm">
                                                            <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-100/60">
                                                                {row.datasetSize}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                )) : (
                                                    <tr>
                                                        <td colSpan="5" className="py-16 text-center text-sm text-gray-500">
                                                            <div className="flex flex-col items-center justify-center">
                                                                <svg className="w-8 h-8 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                                                No datasets match the current filter selection.
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>


                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 border-t border-slate-800 text-slate-400 mt-auto py-8">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs font-medium">
                            <p>
                                &copy; 2026 Department of Computer Science and Engineering, Texas A&M University. All rights reserved.
                            </p>
                        </div>
                    </footer>

                    {/* Hover Image Tooltip */}
                    {hoveredModality && modalityImages[hoveredModality.toLowerCase().replace(/amp/g, '').replace(/and/g, '').replace(/[^a-z0-9]/g, '')] && (
                        <div
                            className="fixed z-50 pointer-events-none p-2 bg-white/95 backdrop-blur-sm border border-slate-200/80 shadow-2xl rounded-xl flex flex-col items-center gap-1.5 transition-all duration-100 ease-out"
                            style={{
                                top: tooltipPos.top,
                                left: tooltipPos.left,
                                width: '200px'
                            }}
                        >
                            <img
                                src={`hover_images/${encodeURIComponent(modalityImages[hoveredModality.toLowerCase().replace(/amp/g, '').replace(/and/g, '').replace(/[^a-z0-9]/g, '')])}`}
                                alt={hoveredModality}
                                className="w-full h-40 rounded-lg object-cover shadow-sm border border-slate-100"
                            />
                            <div className="text-[11px] font-bold text-slate-700 tracking-wide uppercase px-1 py-0.5">
                                {hoveredModality}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
